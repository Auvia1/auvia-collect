version: '3.8'

services:
  # 🚀 ADDED: Dedicated internal Redis container
  redis:
    image: redis:7-alpine
    container_name: auvia-collect-redis
    restart: always

  express-backend:
    build:
      context: ./server
    ports:
      - '5001:5001'
    environment:
      - PORT=5001
      - 'DATABASE_URL=${DATABASE_URL}'
      - 'JWT_SECRET=${JWT_SECRET}'
      - 'BOT_SECRET=${BOT_SECRET}'
      - 'FRONTEND_URL=${FRONTEND_URL}'
      - 'VOICE_AGENT_URL=http://voice-agent:8765'
      - 'REDIS_URL=redis://redis:6379' # 🚀 Points directly to the local container
    depends_on:
      - redis
    restart: always

  voice-agent:
    build:
      context: ./auvia-voice-agent
    ports:
      - '8765:8765'
    expose:
      - '8765'
    labels:
      - "traefik.http.services.voice-agent.loadbalancer.server.port=8765"
    environment:
      - 'AUVIA_BACKEND_URL=http://express-backend:5001'
      - 'AUVIA_BOT_SECRET=${BOT_SECRET}'
      - 'SARVAM_API_KEY=${SARVAM_API_KEY}'
      - 'GEMINI_API_KEY=${GEMINI_API_KEY}'
      - 'REDIS_URL=redis://redis:6379' # 🚀 Points directly to the local container
    depends_on:
      - express-backend
      - redis
    restart: always